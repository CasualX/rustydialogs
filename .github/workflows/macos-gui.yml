name: macOS GUI Session

on:
  workflow_dispatch:

jobs:
  macos-gui:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tmate
        run: brew install tmate

      - name: Enable Screen Sharing (VNC)
        run: |
          # Set a temporary password for VNC
          VNC_PASS="runnerpass"
          echo "$VNC_PASS" | perl -we '
            chomp;
            print pack("C*", map { ord($_) ^ 0x23 } split //);
          ' | sudo tee /Library/Preferences/com.apple.VNCSettings.txt

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw runnerpass \
            -restart -agent -privs -all

      - name: Start tmate session
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          echo "=============================="
          echo "SSH COMMAND:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          echo "=============================="
          echo "After SSH, run this locally:"
          echo "ssh -N -L 5900:localhost:5900 <tmate-ssh-command>"
          echo "Then connect VNC to: localhost:5900"
          sleep 3600
