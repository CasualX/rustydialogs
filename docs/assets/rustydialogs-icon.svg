<svg xmlns="http://www.w3.org/2000/svg" width="430" height="430" viewBox="42 38 430 430" role="img" aria-label="Rusty Dialogs icon">
  <defs>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="70" y="66" width="372" height="380" rx="5" fill="#f8fafc"/>
    <rect x="70" y="66" width="372" height="56" rx="5" fill="url(#title)"/>
    <circle cx="98" cy="94" r="6" fill="#fff" opacity="0.82"/>
    <circle cx="118" cy="94" r="6" fill="#fff" opacity="0.55"/>
    <circle cx="138" cy="94" r="6" fill="#fff" opacity="0.35"/>
    <text x="272" y="102" text-anchor="middle" font-size="24" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#0f172a" font-weight="800">Rusty Dialogs</text>

    <text x="100" y="152" font-size="15" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#475569" font-weight="400">Cross-platform native dialogs for Rust</text>

    <rect x="98" y="174" width="316" height="202" rx="5" fill="#e2e8f0"/>
    <text x="116" y="204" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• 💬 MessageBox</text>
    <text x="116" y="232" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• 📁 FileDialog</text>
    <text x="116" y="260" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• 📂 FolderDialog</text>
    <text x="116" y="288" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• ⌨️ TextInput</text>
    <text x="116" y="316" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• 🎨 ColorPicker</text>
    <text x="116" y="344" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• 🔔 Notification</text>

    <rect x="246" y="392" width="78" height="32" rx="5" fill="#f97316"/>
    <text x="285" y="413" text-anchor="middle" font-size="13" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#fff" font-weight="700">Show</text>

    <rect x="334" y="392" width="78" height="32" rx="5" fill="#cbd5e1"/>
    <text x="373" y="413" text-anchor="middle" font-size="13" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155" font-weight="700">Cancel</text>
  </g>
</svg>
