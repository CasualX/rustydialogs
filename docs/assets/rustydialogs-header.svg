<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Rusty Dialogs header">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>

  <g opacity="0.25">
    <circle cx="1060" cy="70" r="120" fill="#f97316"/>
    <circle cx="180" cy="320" r="140" fill="#334155"/>
  </g>

  <g transform="translate(70,25)" filter="url(#shadow)">
    <rect width="470" height="312" rx="5" fill="#f8fafc"/>
    <rect width="470" height="56" rx="5" fill="url(#accent)"/>
    <circle cx="24" cy="28" r="5.5" fill="#fff" opacity="0.85"/>
    <circle cx="42" cy="28" r="5.5" fill="#fff" opacity="0.55"/>
    <circle cx="60" cy="28" r="5.5" fill="#fff" opacity="0.35"/>
    <text x="235" y="38" text-anchor="middle" font-size="24" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#0f172a" font-weight="800">Rusty Dialogs</text>

    <text x="24" y="90" font-size="15" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#475569" font-weight="400">Cross-platform native dialogs for Rust</text>

    <rect x="24" y="108" width="422" height="146" rx="5" fill="#e2e8f0"/>
    <text x="40" y="132" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• 💬 MessageBox</text>
    <text x="40" y="154" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• 📁 FileDialog</text>
    <text x="40" y="176" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• 📂 FolderDialog</text>
    <text x="40" y="198" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• ⌨️ TextInput</text>
    <text x="40" y="220" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• 🎨 ColorPicker</text>
    <text x="40" y="242" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155">• 🔔 Notification</text>

    <rect x="286" y="266" width="72" height="30" rx="5" fill="#f97316"/>
    <text x="322" y="286" text-anchor="middle" font-size="13" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#fff" font-weight="700">Show</text>

    <rect x="370" y="266" width="72" height="30" rx="5" fill="#cbd5e1"/>
    <text x="406" y="286" text-anchor="middle" font-size="13" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#334155" font-weight="700">Cancel</text>
  </g>

  <g transform="translate(600,90)">
    <text x="0" y="0" font-size="54" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#f8fafc" font-weight="800">Rusty Dialogs</text>
    <text x="0" y="44" font-size="24" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#cbd5e1">Native dialogs, files, inputs, colors, notifications</text>

    <g transform="translate(0,90)">
      <rect width="520" height="58" rx="14" fill="#111827" stroke="#334155"/>
      <text x="22" y="37" font-size="20" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#f8fafc">cargo add rustydialogs</text>
    </g>

    <g transform="translate(0,172)">
      <text x="0" y="0" font-size="16" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#94a3b8">Windows · Linux/BSD · macOS</text>
    </g>
  </g>
</svg>
